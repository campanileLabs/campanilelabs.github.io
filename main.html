<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #ffffff;
        }
        div {
            color: rgb(255, 255, 255);
            /* background-color: #c610f3;
            margin: 10px 0;
            padding: 10px; 
            font-size: 20px; 
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);*/
        }
        .container {
            display: flex;
            width: 100%;
        }

        .div_section {
            flex: 1;   /* each section takes equal share */
        }
        .div_container {
            display: grid;
            grid-template-columns: clamp(0px, 15%, 200px) 1fr clamp(0px, 15%, 200px);
            width: 100%;
            height: 2160px;
        }

        .div_left {
            /* background-color: #03bb03; */
            width: 100%;
        }

        .div_right {
            /* background-color: #fae208; */
            width: 100%;
        }
        h1 {
            font-size: 28px;
            color: #333;
        }
        .section {
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            div {
                font-size: 18px;
                padding: 8px;
            }
            h1 {
                font-size: 24px;
            }
        }

    </style>
</head>
<body>
    <div id="top-placeholder"></div>

    <div class="div_container">
        <div class="div_left"></div>
        <div id="middle-placeholder"></div>
        <div class="div_right"></div>
    </div>

    <div id="bottom-placeholder"></div>

    <script>
        function loadMiddle(href) {
            fetch(href)
                .then(r => r.text())
                .then(html => {
                    document.getElementById('middle-placeholder').innerHTML = html;
                });
        }

        document.addEventListener('click', function(e) {
            const link = e.target.closest('a[data-middle]');
            if (!link) return;
            e.preventDefault();
            loadMiddle(link.getAttribute('data-middle'));
        });

        fetch('top.html').then(r => r.text()).then(html => {
            document.getElementById('top-placeholder').innerHTML = html;
        });
        fetch('bottom.html').then(r => r.text()).then(html => {
            document.getElementById('bottom-placeholder').innerHTML = html;
        });
        fetch('middle.html').then(r => r.text()).then(html => {
            document.getElementById('middle-placeholder').innerHTML = html;
        });
    </script>

</html>
